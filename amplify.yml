version: 1
backend:
  phases:
    preBuild:
      commands:
        - node -v || true
        - npm -v || true
        - echo "Skip npm install in backend phase"
    build:
      commands:
        - |
          if [ "$SKIP_BACKEND_DEPLOY" = "true" ]; then
            echo "Skipping backend deploy (SKIP_BACKEND_DEPLOY=true)";
          else
            export AMPLIFY_DIFF_BACKEND=true;
            npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID;
          fi
  cache:
    paths:
      - .npm/**

frontend:
  phases:
    preBuild:
      commands:
        - node -v || true
        - npm -v || true
        - npm ci --cache .npm --prefer-offline --no-audit --no-fund || npm install --no-audit --no-fund
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*